# CNB pipeline for GDR.
#
# Three pipelines, each running on push to main and on PR:
#  1. lint      — ruff check/format (fast, no QEMU)
#  2. qemu-test-a9 — Cortex-A9 closed-loop test
#  3. qemu-test-rv64 — RISC-V RV64 closed-loop test
#
# Both QEMU pipelines use `docker.build` with `ci/Dockerfile`; the resulting
# image is cached by hash on the CNB artifact registry, so subsequent runs reuse
# it. CNB's `pull_request` reads the configured pipeline from the *target*
# branch's `.cnb.yml` (here: main) and checks out the pre-merged commit — so
# defining both `push:` and `pull_request:` under `main:` is the canonical way
# to gate every push and every PR.
#
# Arch: `cnb:arch:amd64` runs both Cortex-A9 and RV64 QEMU targets under TCG.
# An arm64 host gains nothing for either cross-ISA target, so amd64 is simplest.
# Ref: https://docs.cnb.cool/zh/build/build-node.html

main: # branch: main
  push:
    # ---------------------------------------------------------------
    # lint: static checks. Uses python:3.12 because the CNB default image
    # `cnbcool/default-build-env` only ships git/jq/rsync/curl — no pip.
    # ---------------------------------------------------------------
    - name: lint
      docker:
        image: python:3.12
      stages:
        - name: ruff check
          script: |
            pip install --quiet "ruff>=0.11"
            ruff check .
        - name: ruff format check
          script: ruff format --check .

    - name: qemu-test-a9
      runner:
        tags: cnb:arch:amd64
        cpus: 4
      docker:
        # ci/Dockerfile pins QEMU, GDB, xPack ARM/RISC-V GCC/newlib, scons,
        # and uv. `by` lets CNB invalidate the cached image only when
        # the Dockerfile changes; rebuilds are otherwise read from the
        # artifact registry.
        build:
          dockerfile: ci/Dockerfile
          by:
            - ci/Dockerfile
      volumes:
        # Cache the RT-Thread clone + scons build outputs across runs.
        # `copy-on-write` lets concurrent PR builds share the cache safely.
        - /tmp/rt-thread-build:copy-on-write
        - /root/.cache/uv:copy-on-write
      env:
        # Use gdb-multiarch (the container's GDB with ARM target support).
        GDR_GDB: gdb-multiarch
        RT_THREAD_TARGET: cortex-a9
        RTOS_TOOLCHAIN_PATH: /opt/xpack-arm-none-eabi-gcc-15.2.1-1.1/bin
        CROSS_TOOL_PREFIX: arm-none-eabi-
      stages:
        - name: pytest matrix (QEMU closed-loop)
          script: bash ci/rt-thread/run-qemu-matrix.sh cortex-a9

    - name: qemu-test-rv64
      runner:
        tags: cnb:arch:amd64
        cpus: 4
      docker:
        build:
          dockerfile: ci/Dockerfile
          by:
            - ci/Dockerfile
      volumes:
        - /tmp/rt-thread-build:copy-on-write
        - /root/.cache/uv:copy-on-write
      env:
        GDR_GDB: gdb-multiarch
        GDR_QEMU_TARGET: rv64
        RT_THREAD_TARGET: rv64
        RTOS_TOOLCHAIN_PATH: /opt/xpack-riscv-none-elf-gcc-15.2.0-1/bin
        CROSS_TOOL_PREFIX: riscv64-unknown-elf-
      stages:
        - name: pytest RV64 matrix (QEMU closed-loop)
          script: bash ci/rt-thread/run-qemu-matrix.sh rv64

  pull_request:
    # Mirror of the push pipelines, for pre-merge feedback on PRs.
    - name: lint
      docker:
        image: python:3.12
      stages:
        - name: ruff check
          script: |
            pip install --quiet "ruff>=0.11"
            ruff check .
        - name: ruff format check
          script: ruff format --check .

    - name: qemu-test-a9
      runner:
        tags: cnb:arch:amd64
        cpus: 4
      docker:
        build:
          dockerfile: ci/Dockerfile
          by:
            - ci/Dockerfile
      volumes:
        - /tmp/rt-thread-build:copy-on-write
        - /root/.cache/uv:copy-on-write
      env:
        GDR_GDB: gdb-multiarch
        RT_THREAD_TARGET: cortex-a9
        RTOS_TOOLCHAIN_PATH: /opt/xpack-arm-none-eabi-gcc-15.2.1-1.1/bin
        CROSS_TOOL_PREFIX: arm-none-eabi-
      stages:
        - name: pytest matrix (QEMU closed-loop)
          script: bash ci/rt-thread/run-qemu-matrix.sh cortex-a9

    - name: qemu-test-rv64
      runner:
        tags: cnb:arch:amd64
        cpus: 4
      docker:
        build:
          dockerfile: ci/Dockerfile
          by:
            - ci/Dockerfile
      volumes:
        - /tmp/rt-thread-build:copy-on-write
        - /root/.cache/uv:copy-on-write
      env:
        GDR_GDB: gdb-multiarch
        GDR_QEMU_TARGET: rv64
        RT_THREAD_TARGET: rv64
        RTOS_TOOLCHAIN_PATH: /opt/xpack-riscv-none-elf-gcc-15.2.0-1/bin
        CROSS_TOOL_PREFIX: riscv64-unknown-elf-
      stages:
        - name: pytest RV64 matrix (QEMU closed-loop)
          script: bash ci/rt-thread/run-qemu-matrix.sh rv64
